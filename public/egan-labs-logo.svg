<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <!-- Checkerboard pattern: every other 8×8 block is black (hidden) -->
    <pattern id="checker" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="black"/>
      <rect x="0" y="0" width="8" height="8" fill="white"/>
      <rect x="8" y="8" width="8" height="8" fill="white"/>
    </pattern>
    <!-- Mask: fully visible everywhere except Labs region (checkerboard) -->
    <mask id="labsGlitch">
      <rect width="800" height="220" fill="white"/>
      <rect x="438" y="0" width="362" height="220" fill="url(#checker)"/>
    </mask>
  </defs>

  <!-- Purple background -->
  <rect width="800" height="220" fill="#7C3AED"/>

  <!-- Play-button icon: right-pointing triangle with square cutout (evenodd) -->
  <path
    fill-rule="evenodd"
    fill="white"
    d="M 26 20 L 26 200 L 156 110 Z
       M 55 88 L 55 124 L 91 124 L 91 88 Z"
  />

  <!-- "Egan Labs" — Labs has the checkerboard glitch mask -->
  <text
    x="180"
    y="155"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="102"
    font-weight="700"
    letter-spacing="-2"
    fill="white"
    mask="url(#labsGlitch)"
  >Egan Labs</text>
</svg>
